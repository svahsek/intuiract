## Integration with Skill Workflow

This mapping file is used during the **Generation Phase** of the release-notes skill:

```
Reconciliation Output: release-evidence.yaml
                    ↓
              [This Mapping]
                    ↓
         Generated release-notes.yaml
                    ↓
       Schema Validation (release-notes-schema.yaml)
                    ↓
         Policy Rules Validation (release-notes-rule.yaml)
                    ↓
       Vale/Doc Detective Quality Checks
                    ↓
        Confidence Gate (auto-include if >= 85)
                    ↓
         Render to Markdown
                    ↓
         Publish Release Notes
```

See [../../skills/release-notes/SKILL.md](../../skills/release-notes/SKILL.md) for full workflow.
