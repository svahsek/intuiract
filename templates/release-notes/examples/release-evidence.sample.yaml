  # === REL-002: BUG FIX ===
  - item_id: "REL-002"
    change_type: "bug"

    intent:
      github_issue_number: 2340
      github_issue_url: "https://github.com/opencrvs/opencrvs-core/issues/2340"
      issue_title: "Concurrent registration requests causing duplicate records"
      issue_description: |
        When two identical registration requests arrive within the same second,
        both are processed as new, creating duplicate records in the system.
        Impact: Data integrity, duplicate payments, downstream data loss.
      issue_labels: ["type:bug", "area:registration", "severity:high", "release:target-v1.2.3"]
      issue_milestone: "v1.2.3"
      user_impact: "Fixed race condition that caused duplicate records when concurrent registration requests arrive simultaneously"

    change:
      pr_number: 5879
      pr_url: "https://github.com/opencrvs/opencrvs-core/pull/5879"
      pr_title: "fix: concurrent registration request handling"
      pr_description: |
        Implements distributed locking mechanism to prevent duplicate record creation.
        - Added Redis-based distributed lock on (UIN, registration_type) key
        - Lock duration: 5 seconds
        - Duplicate requests within window return existing record ID
      pr_labels: ["type:bug", "area:registration", "qa:passed"]
      merged_at: "2026-04-21T14:20:00Z"
      merged_by: "david@example.com"

