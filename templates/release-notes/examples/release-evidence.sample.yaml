## Usage

1. **Reference**: Copy this structure when building your own extractors/reconcilers.
2. **Test Fixture**: Use this YAML to test release-notes generation without running extraction.
3. **Validation**: Run this through schema and rule validators to verify completeness.
4. **Mapping**: Use this as input to `evidence-to-release-notes-mapping.yaml` → `release-notes-schema.yaml`.

## Key Observations from Sample

1. **Complete Linkage**: Each item has issue, PR, commits, QA tests, documentation.
2. **Confidence Spread**: REL-001 (98), REL-002 (92), REL-003 (88) — all high, all auto-include.
3. **Unresolved Item**: REL-004 is flagged because PR lacks linked issue.
4. **Normalized Output**: Each item includes `normalized_for_release_notes` fields ready for mapping.
5. **Shipped Consistency**: All included items have matching `release_tag`, `tag_commit_sha`.
