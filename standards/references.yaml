# Documentation Standards & References Registry
# 
# Central registry of external documentation standards and best practices
# Updated: April 5, 2026 (URLs VERIFIED)
# 
# IMPORTANT NOTES:
# - Some repositories are archived but remain valuable references (marked as "archived-stable")
# - URLs are tested and working. Report broken links if found.
# - Use 'raw_url' to fetch raw markdown content, 'url' for GitHub web interface
# - All external references are optional - fallback to internal templates if unavailable
# 
# Usage: Agents load this file to fetch documentation standards and patterns
# All URLs are direct references - no local copies needed

documentation_standards:
  
  # ============================================================================
  # ARCHITECTURE & STRUCTURE FRAMEWORKS
  # ============================================================================
  
  diataxis:
    name: "Diátaxis"
    url: "https://diataxis.fr/"
    description: "Information architecture framework dividing content into Tutorials, How-to Guides, Explanation, and Reference"
    best_for: "Site structure, navigation planning, content strategy"
    updated: "2024"
    status: "active"
    
  # ============================================================================
  # THE GOOD DOCS PROJECT (TGDP) - MAIN TEMPLATES
  # ============================================================================
  
  good_docs_project:
    name: "The Good Docs Project"
    repository: "https://gitlab.com/tgdp/templates"
    description: "Researched, well-tested templates for software documentation (now hosted on GitLab)"
    status: "active"
    note: "Active templates hosted at GitLab. GitHub repository archived Sept 2022 for reference."
    github_archive: "https://github.com/thegooddocsproject/templates"
    
    templates:
      how_to:
        url: "https://gitlab.com/tgdp/templates/-/blob/main/how-to/template_how-to.md"
        guide: "https://gitlab.com/tgdp/templates/-/blob/main/how-to/guide_how-to.md"
        description: "Step-by-step guide for accomplishing a specific task"
        use_when: "Providing practical, actionable instructions"
        
      explanation:
        url: "https://gitlab.com/tgdp/templates/-/blob/main/explanation/template_explanation.md"
        guide: "https://gitlab.com/tgdp/templates/-/blob/main/explanation/guide_explanation.md"
        description: "Conceptual overview and background information"
        use_when: "Teaching 'why' and 'how it works', not just 'how to do it'"
        
      tutorial:
        url: "https://gitlab.com/tgdp/templates/-/blob/main/tutorial/template_tutorial.md"
        guide: "https://gitlab.com/tgdp/templates/-/blob/main/tutorial/guide_tutorial.md"
        description: "Learning-oriented walkthrough for beginners"
        use_when: "Onboarding new users or teaching core concepts"
        
      api_reference:
        url: "https://gitlab.com/tgdp/templates/-/blob/main/api-reference/template_api-reference.md"
        guide: "https://gitlab.com/tgdp/templates/-/blob/main/api-reference/guide_api-reference.md"
        description: "Complete API documentation with parameters and examples"
        use_when: "Documenting API endpoints, functions, or methods"
        
      quickstart:
        url: "https://gitlab.com/tgdp/templates/-/blob/main/quickstart/template_quickstart.md"
        guide: "https://gitlab.com/tgdp/templates/-/blob/main/quickstart/guide_quickstart.md"
        description: "Simplest possible method of getting started"
        use_when: "Helping users set up and get initial value quickly"
        
      reference:
        url: "https://gitlab.com/tgdp/templates/-/blob/main/reference/template_reference.md"
        guide: "https://gitlab.com/tgdp/templates/-/blob/main/reference/guide_reference.md"
        description: "Structured reference or specifications"
        use_when: "Providing fact-checking and specifications"

  # ============================================================================
  # MICROSOFT DOCUMENTATION STANDARDS
  # ============================================================================
  
  microsoft_style:
    name: "Microsoft Style Guide"
    url: "https://github.com/MicrosoftDocs/microsoft-style-guide"
    repository: "https://github.com/MicrosoftDocs/microsoft-style-guide"
    description: "Professional tone, voice, and style guidelines (ARCHIVED July 2025 but still accessible)"
    best_for: "Voice, tone, terminology, formatting conventions"
    status: "archived-stable"
    note: "Repository archived by Microsoft but content remains accessible. Represents best practices from Azure/Office docs"
    
    active_resources:
      - name: "Microsoft Learn - Contributor Guide"
        url: "https://learn.microsoft.com/en-us/contribute/"
        description: "Active Microsoft documentation standards and authoring guidelines (current primary reference)"
      
  # ============================================================================
  # CLOUD NATIVE COMPUTING FOUNDATION (CNCF)
  # ============================================================================
  
  cncf_kubernetes:
    name: "Kubernetes Documentation"
    url: "https://kubernetes.io/docs/"
    repository: "https://github.com/kubernetes/kubernetes"
    description: "Comprehensive documentation for Kubernetes, the flagship CNCF cloud-native orchestration platform"
    best_for: "Infrastructure, container orchestration, deployment patterns, system design"
    status: "active"
    focus:
      - "Architecture overview & concepts"
      - "Cluster setup and deployment"
      - "Task-based tutorials"
      - "API reference"
      - "kubectl command reference"
    note: "Living documentation maintained by Kubernetes community; authoritative source for cloud-native patterns"

  # ============================================================================
  # DOCSIE ENGINEERING TEMPLATE LIBRARY (2026)
  # ============================================================================
  
  docsie_resources:
    name: "Docsie Documentation Platform"
    url: "https://www.docsie.io/"
    description: "Engineering documentation platform with templates and best practices for technical teams"
    best_for: "DevOps, internal-facing docs, system architecture, runbooks"
    status: "active"
    note: "Primary documentation platform; specific template links vary by version"
    
    key_categories:
      - "System Architecture Overviews"
      - "Runbooks & Operational Procedures"
      - "Incident Response procedures"
      - "Deployment guides"
      - "Troubleshooting guides"
      - "System design documents"

  # ============================================================================
  # ADDITIONAL REFERENCES
  # ============================================================================
  
  write_the_docs:
    name: "Write the Docs Community"
    url: "https://www.writethedocs.org/"
    repository: "https://github.com/writethedocs/"
    description: "Community of technical documentation professionals with guides, resources, and events"
    best_for: "Best practices, community wisdom, documentation strategy"
    status: "active"
    resources:
      - guides: "https://www.writethedocs.org/guide/"
      - newsletter: "https://www.writethedocs.org/newsletter/"
      - slack: "https://www.writethedocs.org/slack/"
      
  awesome_prompts:
    name: "prompts.chat (Awesome ChatGPT Prompts)"
    url: "https://prompts.chat/"
    repository: "https://github.com/f/prompts.chat"
    description: "World's largest open-source prompt library with 157k stars"
    best_for: "System prompts, agent instructions, prompt engineering patterns"
    status: "active"
    
  # ============================================================================
  # INTERNAL REFERENCES (Within this repository)
  # ============================================================================
  
  internal_standards:
    description: "Custom standards defined in this repository"
    content_registry:
      path: "standards/content-types.yaml"
      description: "Registry of supported content types and their public entrypoints"
    release_notes_manifest:
      path: "standards/content-types/release-notes.yaml"
      description: "Consumer-facing manifest for release notes schema, rendering rules, and examples"
    
    skills:
      path: ".github/skills/"
      description: "Reusable skills and functions for agents"
      
    prompts:
      path: ".github/prompts/"
      description: "System and task prompts for agents"
      
    templates:
      path: "templates/"
      description: "Output templates and formatting standards"
      
    agents:
      path: "consumer-repo/.github/agents/"
      description: "Custom agent definitions and configurations (consumer repo example)"

# ============================================================================
# USAGE GUIDE FOR AGENTS
# ============================================================================

agent_usage_guide: |
  
  ## How Agents Should Use This Registry
  
  1. **Load the Registry**
     - Read this file (references.yaml)
     - Identify the relevant standard for your task
  
  2. **Fetch the Standard**
     - Prefer 'raw_url' for direct markdown content (when provided)
     - Use 'url' to visit GitHub page for more context
     - If URL fails, check 'status' field and try 'fallback' or internal template
  
  3. **Apply to Output**
     - Use the structure as a template
     - Apply internal brand voice and style
     - Maintain consistency with Microsoft Learn Style Guide conventions
  
  4. **Document Type Selection**
     - Practical task → Use TGDP "How-To" template
     - Conceptual explanation → Use TGDP "Explanation" template
     - API documentation → Use TGDP "API Reference" template
     - First-steps guide → Use TGDP "Quickstart" template
     - System architecture → Use Docsie "System Architecture Overview" template
     - Operations procedure → Use Docsie "Runbook" template
  
  5. **Tone & Voice**
     - Always reference Microsoft Learn Style Guide for professional tone
     - Use Write the Docs community best practices
  
  6. **Fallback Strategy**
     - If external URL is unavailable, check 'fallback' field
    - Use equivalent internal template from templates/[doc-type]/
     - Update this file with status if URL breaks for >24 hours

